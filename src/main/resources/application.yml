spring:
  session:
    store-type: redis
    timeout: 2592000
  profiles:
    active: local
  application:
    name: zhang-ai-code-mother
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/zhang_ai_code_mother
    username: root
    password: root
  data:
    redis:
      host: localhost
      port: 6379
      password:
      ttl: 3600
      database: 0
server:
  port: 8123
  servlet:
    context-path: /api
    session:
      cookie:
        max-age: 2592000
